---
- name: Set user paths
  ansible.builtin.set_fact:
    user_home: "/home/{{ arch_username }}"
    repo_root: "/home/{{ arch_username }}/src/myconfigfiles"
    managed_root: "/home/{{ arch_username }}/src/myconfigfiles/ansible/arch-ansible/linked-config/{{ arch_hostname }}"

- name: Define managed file/link sets
  ansible.builtin.set_fact:
    common_managed_files:
      - { src: fish_config.fish.j2, rel: ".config/fish/config.fish" }
      - { src: tmux.conf.j2, rel: ".tmux.conf" }
      - { src: starship.toml.j2, rel: ".config/starship.toml" }
      - { src: alacritty.toml.j2, rel: ".config/alacritty/alacritty.toml" }
      - { src: mimeapps.list.j2, rel: ".config/mimeapps.list" }
      - { src: user-env.conf.j2, rel: ".config/environment.d/99-desktop.conf" }
      - { src: gtk-settings.ini.j2, rel: ".config/gtk-3.0/settings.ini" }
      - {
          src: vivaldi-stable.desktop.j2,
          rel: ".local/share/applications/vivaldi-stable.desktop",
        }
      - {
          src: vivaldi-share.sh.j2,
          rel: ".local/bin/vivaldi-share",
          mode: "0755",
        }
      - { src: tmux-init.sh.j2, rel: ".local/bin/tmux-init", mode: "0755" }
    kde_managed_files:
      - { src: kdeglobals.j2, rel: ".config/kdeglobals" }
      - { src: kwinrc.j2, rel: ".config/kwinrc" }
      - { src: kscreenlockerrc.j2, rel: ".config/kscreenlockerrc" }
      - {
          src: powermanagementprofilesrc.j2,
          rel: ".config/powermanagementprofilesrc",
        }
      - {
          src: plasma-user-env.sh.j2,
          rel: ".config/plasma-workspace/env/90-user-env.sh",
          mode: "0755",
        }
      - {
          src: kde-apply-monitor-layout.sh.j2,
          rel: ".local/bin/kde-apply-monitor-layout",
          mode: "0755",
        }
      - {
          src: monitor-setup.sh.j2,
          rel: ".config/autostart-scripts/10-monitor-setup.sh",
          mode: "0755",
        }
      - {
          src: kde-startup-apps.sh.j2,
          rel: ".local/bin/kde-startup-apps",
          mode: "0755",
        }
      - {
          src: startup-apps.sh.j2,
          rel: ".config/autostart-scripts/20-startup-apps.sh",
          mode: "0755",
        }
    common_link_files:
      - .config/fish/config.fish
      - .tmux.conf
      - .config/starship.toml
      - .config/alacritty/alacritty.toml
      - .config/mimeapps.list
      - .config/environment.d/99-desktop.conf
      - .config/gtk-3.0/settings.ini
      - .local/share/applications/vivaldi-stable.desktop
      - .local/bin/vivaldi-share
      - .local/bin/tmux-init
    kde_link_files:
      - .config/kdeglobals
      - .config/kwinrc
      - .config/kscreenlockerrc
      - .config/powermanagementprofilesrc
      - .config/plasma-workspace/env/90-user-env.sh
      - .local/bin/kde-apply-monitor-layout
      - .config/autostart-scripts/10-monitor-setup.sh
      - .local/bin/kde-startup-apps
      - .config/autostart-scripts/20-startup-apps.sh

- name: Verify repo exists at expected location
  ansible.builtin.stat:
    path: "{{ repo_root }}"
  register: repo_root_stat

- name: Fail when repo is missing
  ansible.builtin.fail:
    msg: "Expected repo at {{ repo_root }} (per your requirement)."
  when: not repo_root_stat.stat.exists

- name: Ensure managed common config directories exist in repo
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ arch_username }}"
    group: "{{ arch_username }}"
    mode: "0755"
  loop:
    - "{{ managed_root }}"
    - "{{ managed_root }}/.config"
    - "{{ managed_root }}/.config/fish"
    - "{{ managed_root }}/.config/alacritty"
    - "{{ managed_root }}/.config/environment.d"
    - "{{ managed_root }}/.config/gtk-3.0"
    - "{{ managed_root }}/.local"
    - "{{ managed_root }}/.local/bin"
    - "{{ managed_root }}/.local/share"
    - "{{ managed_root }}/.local/share/applications"

- name: Ensure managed KDE config directories exist in repo
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ arch_username }}"
    group: "{{ arch_username }}"
    mode: "0755"
  loop:
    - "{{ managed_root }}/.config/plasma-workspace"
    - "{{ managed_root }}/.config/plasma-workspace/env"
    - "{{ managed_root }}/.config/autostart-scripts"
  when: kde_enabled | bool

- name: Ensure common user parent directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ arch_username }}"
    group: "{{ arch_username }}"
    mode: "0755"
  loop:
    - "{{ user_home }}/.config"
    - "{{ user_home }}/.config/fish"
    - "{{ user_home }}/.config/alacritty"
    - "{{ user_home }}/.config/environment.d"
    - "{{ user_home }}/.config/gtk-3.0"
    - "{{ user_home }}/.local"
    - "{{ user_home }}/.local/bin"
    - "{{ user_home }}/.local/share"
    - "{{ user_home }}/.local/share/applications"

- name: Ensure KDE user parent directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ arch_username }}"
    group: "{{ arch_username }}"
    mode: "0755"
  loop:
    - "{{ user_home }}/.config/plasma-workspace"
    - "{{ user_home }}/.config/plasma-workspace/env"
    - "{{ user_home }}/.config/autostart-scripts"
  when: kde_enabled | bool

- name: Render common managed config files into repo
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ managed_root }}/{{ item.rel }}"
    owner: "{{ arch_username }}"
    group: "{{ arch_username }}"
    mode: "{{ item.mode | default('0644') }}"
  loop: "{{ common_managed_files }}"

- name: Render KDE managed config files into repo
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ managed_root }}/{{ item.rel }}"
    owner: "{{ arch_username }}"
    group: "{{ arch_username }}"
    mode: "{{ item.mode | default('0644') }}"
  loop: "{{ kde_managed_files }}"
  when: kde_enabled | bool

- name: Stat common link targets in home
  ansible.builtin.stat:
    path: "{{ user_home }}/{{ item }}"
  loop: "{{ common_link_files }}"
  register: common_link_stats

- name: Backup existing common non-symlink files before linking
  ansible.builtin.command:
    argv:
      - mv
      - "{{ user_home }}/{{ item.item }}"
      - "{{ user_home }}/{{ item.item }}.bak-{{ ansible_date_time.iso8601_basic_short }}"
  loop: "{{ common_link_stats.results }}"
  when:
    - user_config_backup_existing | bool
    - item.stat.exists
    - not (item.stat.islnk | default(false))

- name: Symlink common config files from home to repo
  ansible.builtin.file:
    src: "{{ managed_root }}/{{ item }}"
    dest: "{{ user_home }}/{{ item }}"
    state: link
    force: true
    owner: "{{ arch_username }}"
    group: "{{ arch_username }}"
  loop: "{{ common_link_files }}"

- name: Stat KDE link targets in home
  ansible.builtin.stat:
    path: "{{ user_home }}/{{ item }}"
  loop: "{{ kde_link_files }}"
  register: kde_link_stats
  when: kde_enabled | bool

- name: Backup existing KDE non-symlink files before linking
  ansible.builtin.command:
    argv:
      - mv
      - "{{ user_home }}/{{ item.item }}"
      - "{{ user_home }}/{{ item.item }}.bak-{{ ansible_date_time.iso8601_basic_short }}"
  loop: "{{ kde_link_stats.results }}"
  when:
    - kde_enabled | bool
    - user_config_backup_existing | bool
    - item.stat.exists
    - not (item.stat.islnk | default(false))

- name: Symlink KDE config files from home to repo
  ansible.builtin.file:
    src: "{{ managed_root }}/{{ item }}"
    dest: "{{ user_home }}/{{ item }}"
    state: link
    force: true
    owner: "{{ arch_username }}"
    group: "{{ arch_username }}"
  loop: "{{ kde_link_files }}"
  when: kde_enabled | bool
