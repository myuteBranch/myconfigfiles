[user]
name = "myuteBranch"
email = "myutexlock@pm.me"

[ui]
editor = "nvim"
default-command = "log"
conflict-marker-style = "git"
diff-formatter = ["difft", "--color=always", "$left", "$right"]

[revsets]
log = 'present(@) | ancestors(immutable_heads().., 5) | present(trunk())'

[aliases]
rebase-all = ["rebase", "-s", "(::trunk())+ & mutable()", "-d", "trunk()"]
